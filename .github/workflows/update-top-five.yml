name: Update Top 5 data

on:
  schedule:
    - cron: "25 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install kaggle
      - name: Download current box scores
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: kaggle datasets download -d eoinamoore/historical-nba-data-and-player-box-scores -f PlayerStatistics.csv -p data/raw --unzip
      - run: node scripts/buildLiveTopFiveStats.mjs
      - run: npm run data:top5
      - name: Validate generated rankings
        run: npm run check:top5
      - name: Commit changes
        run: |
          git config user.name "court-inside-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live-top-five-stats.json data/top-five.json
          git diff --cached --quiet || git commit -m "data: update daily Top 5 rankings"
          git push
