name: Update Top 5 data

on:
  push:
    branches: [main]
    paths: [.github/workflows/update-top-five.yml]
  schedule:
    - cron: "25 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install kagglehub==0.3.13
      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python -c 'import json,os,pathlib; p=pathlib.Path.home()/".kaggle"; p.mkdir(exist_ok=True); (p/"kaggle.json").write_text(json.dumps({"username":os.environ["KAGGLE_USERNAME"],"key":os.environ["KAGGLE_KEY"]})); (p/"kaggle.json").chmod(0o600)'
      - name: Download current box scores
        run: python -c 'import kagglehub,pathlib,shutil; target=pathlib.Path("data/raw"); target.mkdir(parents=True,exist_ok=True); source=kagglehub.dataset_download("eoinamoore/historical-nba-data-and-player-box-scores",path="PlayerStatistics.csv"); shutil.copy2(source,target/"PlayerStatistics.csv")'
      - run: node scripts/buildLiveTopFiveStats.mjs
      - run: npm run data:top5
      - name: Validate generated rankings
        run: npm run check:top5
      - name: Commit changes
        run: |
          git config user.name "court-inside-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live-top-five-stats.json data/top-five.json
          git diff --cached --quiet || git commit -m "data: update daily Top 5 rankings"
          git push
